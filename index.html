<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palette Generator</title>
    <meta
      name="description"
      content="Drop in an image, extract a color palette, and copy hex codes instantly in your browser."
    />
    <meta name="theme-color" content="#f6f3ee" />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./shared/tokens.css" />
    <link rel="stylesheet" href="./shared/darkmode.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="app-shell" id="app">
      <header class="hero-panel">
        <div>
          <p class="suite-label">Northline Photo</p>
          <h1>Palette Generator</h1>
          <p class="subtitle">
            Drop in an image, extract a color palette, and copy hex codes instantly.
          </p>
        </div>
        <div class="hero-note">
          <p class="hero-note-label">Local-first</p>
          <strong>Palette strip ready</strong>
          <p>Analyze an image in the browser, copy individual swatches, and export a simple palette PNG.</p>
        </div>
      </header>

      <section class="controls" aria-label="Palette controls">
        <label class="palette-size-label" for="paletteSize">Palette size</label>
        <select id="paletteSize" class="palette-size-select" name="paletteSize">
          <option value="6">6</option>
          <option value="8" selected>8</option>
          <option value="10">10</option>
          <option value="12">12</option>
        </select>
      </section>

      <section
        id="dropZone"
        class="drop-zone"
        role="button"
        tabindex="0"
        aria-label="Drop an image or click to browse"
      >
        <input id="imageInput" class="visually-hidden" type="file" accept="image/*" />
        <svg class="upload-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M12 3l4 4h-3v7h-2V7H8l4-4zm-7 13h14v5H5v-5zm2 2v1h10v-1H7z"
          ></path>
        </svg>
        <p class="drop-copy">Drop an image or click to browse</p>
      </section>

      <section class="preview-section" id="previewSection" hidden>
        <h2>Preview</h2>
        <img id="previewImage" alt="Uploaded image preview" />
      </section>

      <section class="palette-section" id="paletteSection" hidden>
        <div class="palette-header">
          <h2>Extracted Palette</h2>
          <button
            id="downloadPalette"
            class="download-button"
            type="button"
            aria-label="Download extracted color palette as a PNG strip"
          >
            Download Palette
          </button>
        </div>
        <div id="paletteSwatches" class="swatches" aria-live="polite"></div>
      </section>

      <canvas id="workingCanvas" class="visually-hidden" aria-hidden="true"></canvas>
    </main>

    <script src="./shared/darkmode.js" defer></script>
    <script src="./js/quantize.js" defer></script>
    <script src="./js/app.js" defer></script>
  </body>
</html>
